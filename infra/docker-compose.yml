version: '3.8'

services:
  postgres-incident:
    image: postgres:15
    environment:
      POSTGRES_DB: incident_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_incident_data:/var/lib/postgresql/data

  postgres-user:
    image: postgres:15
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data

  postgres-notification:
    image: postgres:15
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data

  postgres-analytics:
    image: postgres:15
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data

  postgres-identity:
    image: postgres:15
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5436:5432"
    volumes:
      - postgres_identity_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password

  user-service:
    build:
      context: ..
      dockerfile: apps/user-service/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://postgres:password@postgres-user:5432/user_db
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      LOG_LEVEL: info
    ports:
      - "3003:3003"
    depends_on:
      - postgres-user
      - rabbitmq

  notification-service:
    build:
      context: ..
      dockerfile: apps/notification-service/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://postgres:password@postgres-notification:5432/notification_db
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      LOG_LEVEL: info
      MAIL_HOST: smtp.mailtrap.io
      MAIL_PORT: 2525
      MAIL_USER: your_mailtrap_user
      MAIL_PASS: your_mailtrap_pass
    ports:
      - "3004:3004"
    depends_on:
      - postgres-notification
      - rabbitmq

  analytics-service:
    build:
      context: ..
      dockerfile: apps/analytics-service/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3005
      DATABASE_URL: postgresql://postgres:password@postgres-analytics:5432/analytics_db
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      LOG_LEVEL: info
    ports:
      - "3005:3005"
    depends_on:
      - postgres-analytics
      - rabbitmq

  identity-service:
    image: your-identity-service-image:latest  # Replace with actual image
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
    depends_on:
      - postgres-identity  # Assuming it has its own DB

volumes:
  postgres_incident_data:
  postgres_user_data:
  postgres_notification_data:
  postgres_analytics_data:
  postgres_identity_data: